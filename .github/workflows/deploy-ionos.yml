name: Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP to IONOS
        env:
          SFTP_HOST: ${{ secrets.IONOS_FTP_HOST }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USER }}
          SFTP_PASSWORD: ${{ secrets.IONOS_FTP_PASSWORD }}
          REMOTE_PATH: ${{ secrets.IONOS_FTP_PATH }}
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASSWORD" sftp://"$SFTP_HOST" <<EOF
            set sftp:auto-confirm yes
            set net:max-retries 2
            set net:timeout 30
            mirror --reverse --verbose --parallel=4 \
              --exclude-glob .git/ \
              --exclude-glob .github/ \
              --exclude-glob api/ \
              --exclude-glob node_modules/ \
              --exclude-glob package.json \
              --exclude-glob package-lock.json \
              --exclude-glob README.md \
              --exclude-glob vercel.json \
              --exclude-glob scripts/ \
              --exclude-glob .qa-serve.js \
              --exclude-glob .gitignore \
              --exclude-glob .vercel/ \
              --exclude-glob .playwright-mcp/ \
              ./ "$REMOTE_PATH"
            bye
          EOF
